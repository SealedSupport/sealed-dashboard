<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sealed Real Estate Performance Dashboard</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#f5f7fa;color:#132744;}
.hdr{background:#132744;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-row{display:flex;align-items:center;gap:12px;}
.logo-img{width:40px;height:40px;border-radius:8px;object-fit:cover;}
.brand{font-size:16px;font-weight:800;color:#fff;}
.brand-s{font-size:12px;color:#8eb8d8;font-weight:500;}
.hdr-r{display:flex;align-items:center;gap:12px;}
.sync-lbl{font-size:12px;color:#8eb8d8;}
.btn{background:#fff;color:#132744;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;}
.btn:hover{background:#e8f0fb;}
.btn.busy{opacity:.6;pointer-events:none;}
@keyframes rot{to{transform:rotate(360deg);}}
.sp{display:inline-block;animation:rot .75s linear infinite;}
.tab-bar{background:#1a3360;padding:0 28px;display:flex;align-items:center;}
.tab{padding:13px 22px;font-size:14px;font-weight:700;color:#8eb8d8;cursor:pointer;border-bottom:3px solid transparent;transition:color .15s;white-space:nowrap;}
.tab.on{color:#fff;border-bottom-color:#fff;}
.tab:hover:not(.on){color:#d0e4f5;}
.page{padding:20px 28px;}
.status-bar{border-radius:8px;padding:10px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:12px;font-weight:600;}
.ok{background:#e8f5ef;border:1px solid #a8d8bc;color:#1a6644;}
.info{background:#e8f0fb;border:1px solid #c8d8f0;color:#132744;}
.err{background:#fdecea;border:1px solid #f5c6c6;color:#8b1a1a;}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ok .status-dot{background:#1a6644;} .info .status-dot{background:#1d6fd4;} .err .status-dot{background:#c0392b;}
.cur-strip{background:#132744;border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:0;}
.cur-kpis{display:grid;flex:1;}
.cur-kpi{padding:10px 16px;border-right:1px solid #1e3d70;}
.cur-kpi:last-child{border-right:none;}
.cur-kpi-lbl{font-size:11px;font-weight:700;color:#8eb8d8;letter-spacing:.4px;text-transform:uppercase;margin-bottom:3px;}
.cur-kpi-val{font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1;margin-bottom:3px;}
.cur-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800;}
.cb-ok{background:#166534;color:#4ade80;}.cb-warn{background:#7c4f00;color:#fbbf24;}.cb-bad{background:#7f1d1d;color:#f87171;}.cb-none{background:#1e3d70;color:#8eb8d8;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0 14px;}
.div-line{flex:1;height:1px;background:#c1dae5;}
.div-lbl{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#132744;background:#c1dae5;padding:4px 14px;border-radius:20px;white-space:nowrap;}
.krow4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.krow3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.krow2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.kcard{background:#fff;border-radius:12px;padding:18px 16px;position:relative;box-shadow:0 1px 4px rgba(19,39,68,.07);border:1px solid #e8eef5;}
.kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:#132744;}
.klbl{font-size:11px;font-weight:700;color:#5a7a9a;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.kval{font-size:28px;font-weight:900;letter-spacing:-1px;line-height:1;color:#132744;margin-bottom:3px;}
.kperiod{font-size:12px;color:#8aa8c4;font-weight:500;margin-bottom:8px;}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;margin-bottom:6px;}
.sb-ok{background:#e8f5ef;color:#1a6644;}.sb-warn{background:#fef6e4;color:#7a4f00;}.sb-bad{background:#fdecea;color:#8b1a1a;}.sb-none{background:#f0f4f9;color:#5a7a9a;}
.sb-dot{width:6px;height:6px;border-radius:50%;}
.sb-ok .sb-dot{background:#1a6644;}.sb-warn .sb-dot{background:#c8820a;}.sb-bad .sb-dot{background:#c0392b;}.sb-none .sb-dot{background:#8aa8c4;}
.rate-pct{font-size:15px;font-weight:800;color:#132744;margin-bottom:4px;}
.reco-gap{font-size:12px;font-weight:600;color:#132744;margin-bottom:6px;}
.gap-val{color:#b83025;font-weight:800;}.gap-met{color:#1a6644;font-weight:800;}
.reco-stretch{font-size:11px;color:#5a7a9a;margin-bottom:6px;}
.pbar-wrap{margin-top:6px;}
.pbar-row{display:flex;justify-content:space-between;margin-bottom:3px;}
.pbar-lbl{font-size:11px;font-weight:700;color:#5a7a9a;}
.pbar-track{position:relative;height:8px;background:#e8eef5;border-radius:6px;}
.pbar-fill{height:8px;border-radius:6px;position:absolute;top:0;left:0;transition:width .6s ease;}
.pf-ok{background:#1a7a52;}.pf-warn{background:#c8820a;}.pf-bad{background:#b83025;}
.pbar-tgt{position:absolute;top:-4px;width:2px;height:16px;background:#132744;border-radius:1px;z-index:3;}
.pbar-str{position:absolute;top:-4px;width:2px;height:16px;background:#5a7a9a;border-radius:1px;opacity:.4;z-index:2;}
.ratio-card{background:#fff;border-radius:12px;padding:18px 16px;box-shadow:0 1px 4px rgba(19,39,68,.07);border:1px solid #e8eef5;position:relative;}
.ratio-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:#132744;}
.ratio-big{font-size:34px;font-weight:900;color:#132744;letter-spacing:-1.5px;line-height:1;margin-bottom:2px;}
.ratio-sub{font-size:13px;color:#5a7a9a;margin-bottom:8px;}
.yr-card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 4px rgba(19,39,68,.07);border:1px solid #e8eef5;position:relative;}
.yr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0;background:#132744;}
.yr-row{display:flex;align-items:flex-end;gap:8px;margin:6px 0 8px;}
.yr-blk{flex:1;}.yr-yr-lbl{font-size:11px;font-weight:700;text-transform:uppercase;color:#5a7a9a;margin-bottom:2px;}
.yr-n-old{font-size:18px;font-weight:800;color:#8aa8c4;}.yr-n-new{font-size:22px;font-weight:900;color:#132744;}
.yr-arrow{font-size:16px;color:#c8d8e8;margin-bottom:4px;flex-shrink:0;}
.yr-chg{font-size:14px;font-weight:800;margin-bottom:4px;}
.yr-bar-bg{height:5px;background:#e8eef5;border-radius:3px;overflow:hidden;}
.yr-bar-fill{height:100%;border-radius:3px;background:#132744;}
.chart-tile{background:#fff;border-radius:12px;padding:18px 22px;box-shadow:0 1px 4px rgba(19,39,68,.07);border:1px solid #e8eef5;margin-bottom:12px;}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.ctitle-nm{font-size:16px;font-weight:800;color:#132744;}.ctitle-tot{font-size:16px;font-weight:900;color:#132744;}.ctitle-sub{font-size:12px;color:#5a7a9a;}
.chart-wrap{display:flex;align-items:flex-end;gap:4px;padding-bottom:28px;padding-top:26px;position:relative;}
.mc{display:flex;flex-direction:column;align-items:center;position:relative;}
.mbar-col{display:flex;align-items:flex-end;}.mbar{border-radius:3px 3px 0 0;position:relative;}
.mbar-lbl{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;color:#132744;white-space:nowrap;}
.mlbl{font-size:10px;font-weight:600;color:#5a7a9a;position:absolute;bottom:0;left:50%;transform:translateX(-50%);white-space:nowrap;}
.split-grid{display:grid;grid-template-columns:1fr 12px 1fr;}
.split-hdr{font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px;}
.split-div{display:flex;align-items:stretch;justify-content:center;}.split-div-line{width:2px;background:#e8eef5;border-radius:2px;}
.ov{position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
.ov.h{display:none;}
.sp2{width:36px;height:36px;border:3px solid #e8eef5;border-top-color:#132744;border-radius:50%;animation:rot .7s linear infinite;}
.ovt{font-size:14px;color:#5a7a9a;font-weight:600;}
.ftr{padding:12px 28px;border-top:1px solid #dde6f0;display:flex;justify-content:space-between;background:#fff;}
.ftr span{font-size:12px;color:#5a7a9a;}
@media(max-width:900px){.krow4,.krow3,.krow2,.split-grid{grid-template-columns:repeat(2,1fr);}.page,.hdr,.tab-bar{padding-left:14px;padding-right:14px;}}


/* WEEKLY BREAKDOWN */
.weekly-section{margin-bottom:4px;}
.weekly-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(19,39,68,.07);border:1px solid #e8eef5;}
.weekly-table th{background:#132744;color:#fff;font-size:11px;font-weight:700;padding:10px 12px;text-align:center;white-space:nowrap;}
.weekly-table th.kpi-col{text-align:left;width:130px;}
.weekly-table td{font-size:12px;padding:10px 12px;text-align:center;border-bottom:1px solid #f0f4f9;vertical-align:top;}
.weekly-table td.kpi-label{text-align:left;font-size:11px;font-weight:700;color:#5a7a9a;text-transform:uppercase;letter-spacing:.4px;}
.weekly-table tr:last-child td{border-bottom:none;}
.w-past-ok{color:#1a6644;font-weight:800;}
.w-past-bad{color:#b83025;font-weight:800;}
.w-cur-val{font-size:13px;font-weight:900;color:#132744;display:block;}
.w-cur-need{font-size:10px;color:#b83025;font-weight:700;margin-top:2px;display:block;}
.w-cur-ok{font-size:10px;color:#1a6644;font-weight:700;margin-top:2px;display:block;}
.w-future{color:#8aa8c4;font-size:11px;font-weight:600;}
.w-cur-cell{background:#f0f6ff;}
.w-tgt{font-size:9px;color:#8aa8c4;font-weight:600;margin-top:1px;display:block;}
/* QUARTERLY TARGETS TABLE */
.qtgt-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(19,39,68,.07);border:1px solid #e8eef5;}
.qtgt-table th{background:#132744;color:#fff;font-size:11px;font-weight:700;padding:10px 14px;text-align:center;white-space:nowrap;}
.qtgt-table th.kpi-col{text-align:left;width:140px;}
.qtgt-table td{font-size:12px;padding:10px 12px;text-align:center;border-bottom:1px solid #f0f4f9;vertical-align:top;}
.qtgt-table td.kpi-label{text-align:left;font-size:11px;font-weight:700;color:#5a7a9a;text-transform:uppercase;letter-spacing:.4px;}
.qtgt-table tr:last-child td{border-bottom:none;}
.qtgt-table .q-cur-cell{background:#f0f6ff;}
.q-actual-ok{color:#1a6644;font-weight:800;font-size:13px;display:block;}
.q-actual-bad{color:#b83025;font-weight:800;font-size:13px;display:block;}
.q-actual-cur{color:#132744;font-weight:900;font-size:13px;display:block;}
.q-future{color:#8aa8c4;font-size:12px;font-weight:600;display:block;}
.q-sub{font-size:10px;font-weight:600;margin-top:2px;display:block;}
.q-sub-ok{color:#1a6644;}.q-sub-bad{color:#b83025;}.q-sub-info{color:#5a7a9a;}.q-sub-warn{color:#c8820a;}
.q-catchup-pill{display:inline-block;margin-top:3px;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:800;background:#fff3cd;color:#7a4f00;border:1px solid #f5d47a;}
.q-catchup-pill.q-cp-good{background:#e8f5ef;color:#1a6644;border-color:#a8d8bc;}
.q-tgt-lbl{font-size:9px;color:#8aa8c4;font-weight:600;margin-top:1px;display:block;}
</style>
</head>

async function gql(query){
  var r=await fetch('https://api.monday.com/v2',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN,'API-Version':'2024-01'},
    body:JSON.stringify({query:query})
  });
  if(!r.ok) throw new Error('monday.com error: HTTP '+r.status);
  var j=await r.json();
  if(j.errors) throw new Error(j.errors[0].message);
  return j.data;
}

async function getAllItems(boardId,cols){
  var items=[],cursor=null,maxPages=10,page_num=0;
  while(page_num<maxPages){
    var cp=cursor?', cursor:"'+cursor+'"':'';
    var q='{ boards(ids:['+boardId+']){ items_page(limit:100'+cp+'){ cursor items{ group{title} column_values(ids:'+JSON.stringify(cols)+'){ id text value } } } } }';
    var d=await gql(q);
    var page=d.boards[0].items_page;
    page.items.forEach(function(i){i.group_title=i.group?i.group.title:'';});
    items=items.concat(page.items);
    page_num++;
    if(!page.cursor||page.items.length<100) break;
    cursor=page.cursor;
  }
  return items;
}

function cv(item,id){var c=item.column_values.find(function(x){return x.id===id;});return c?c.text||'':'';}
function cn(item,id){var c=item.column_values.find(function(x){return x.id===id;});if(!c||!c.value)return 0;try{var v=JSON.parse(c.value);return v.number||parseFloat(c.text)||0;}catch(e){return parseFloat(c.text)||0;}}
function inM(d,ym){return d&&d.startsWith(ym);}
function inR(d,f,t){return d&&d>=f&&d<=t;}

function getWeeks(year, month){
  // Returns array of {start, end, label} for each Mon-Sun block in the month
  var weeks = [];
  var d = new Date(year, month-1, 1);
  // Step back to Monday
  while(d.getDay() !== 1) d.setDate(d.getDate()-1);
  var monthEnd = new Date(year, month, 0); // last day of month
  while(d <= monthEnd){
    var ws = new Date(d);
    var we = new Date(d); we.setDate(we.getDate()+6);
    var cs = new Date(Math.max(ws, new Date(year,month-1,1)));
    var ce = new Date(Math.min(we, monthEnd));
    var label = 'W'+' '+(weeks.length+1)+'\n'+cs.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    weeks.push({start:cs, end:ce, label:label});
    d.setDate(d.getDate()+7);
  }
  return weeks;
}

function getQuarterWeeks(year, quarter){
  // FY quarters: Q1=Jul-Sep, Q2=Oct-Dec, Q3=Jan-Mar, Q4=Apr-Jun
  // year param = FY_START_YEAR for Q1/Q2, FY_END_YEAR for Q3/Q4
  var qRanges={
    1:{y:FY_START_YEAR, start:new Date(FY_START_YEAR,6,1), end:new Date(FY_START_YEAR,8,30)},
    2:{y:FY_START_YEAR, start:new Date(FY_START_YEAR,9,1), end:new Date(FY_START_YEAR,11,31)},
    3:{y:FY_END_YEAR,   start:new Date(FY_END_YEAR,0,1),   end:new Date(FY_END_YEAR,2,31)},
    4:{y:FY_END_YEAR,   start:new Date(FY_END_YEAR,3,1),   end:new Date(FY_END_YEAR,5,30)}
  };
  var qInfo=qRanges[quarter]||qRanges[1];
  var qStart=qInfo.start, qEnd=qInfo.end;
  var weeks=[], d=new Date(qStart);
  while(d.getDay()!==1) d.setDate(d.getDate()-1);
  while(d<=qEnd){
    var ws=new Date(d);
    var we=new Date(d); we.setDate(we.getDate()+6);
    var cs=new Date(Math.max(ws.getTime(),qStart.getTime()));
    var ce=new Date(Math.min(we.getTime(),qEnd.getTime()));
    weeks.push({start:cs,end:ce});
    d.setDate(d.getDate()+7);
  }
  return weeks;
}

function dateToStr(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function weeklyActuals(weekStart, weekEnd, monthlyData){
  // From monthly_bars we have monthly totals not weekly
  // When live data available, compute from board items by date range
  // For cached data: distribute using known weekly breakdown
  var ws = dateToStr(weekStart), we = dateToStr(weekEnd);
  var result = {};
  // Use CACHED_WEEKLY if available, else return null (live fetch will populate)
  if(window.WEEKLY_CACHE){
    var wkey = ws+'_'+we;
    return window.WEEKLY_CACHE[wkey] || null;
  }
  return null;
}

function buildWeeklyTable(weeks, today, monthlyTarget, liveItems, tgtKey){
  var KPIs = ['GCI','SOLD','APPR','DK'];
  var KLBL = {GCI:'GCI',SOLD:'Sold',APPR:'Appraisals',DK:'Door Knocks'};
  var numWeeks = weeks.length;
  var tgtPeriod = tgtKey || 'm';
  // Total target for the period
  var periodTgt = {};
  KPIs.forEach(function(k){ periodTgt[k] = TARGETS[k][tgtPeriod] ? TARGETS[k][tgtPeriod][0] : null; });

  // Build weekly actuals from live items or cached
  var todayStr = dateToStr(today);
  var wkActuals = weeks.map(function(w){
    var ws = dateToStr(w.start), we = dateToStr(w.end);
    var act = {};
    if(liveItems){
      act.GCI  = Math.round(liveItems.sold.filter(function(i){var d=cv(i,'date4');return d>=ws&&d<=we;}).reduce(function(a,i){return a+commItem(i);},0)*100)/100;
      act.SOLD = liveItems.sold.filter(function(i){var d=cv(i,'date4');return d>=ws&&d<=we;}).length;
      act.APPR = liveItems.appr.filter(function(i){var d=cv(i,'date4');return d>=ws&&d<=we;}).length;
      act.DK   = liveItems.leads.filter(function(i){return isDK(i)&&cv(i,'date_mkwy7e2v')>=ws&&cv(i,'date_mkwy7e2v')<=we;}).length;
    } else {
      var now2=new Date(); var isJun2026=(now2.getFullYear()===2026&&now2.getMonth()===5);
      if(isJun2026 && weeks.length<=5){
        var CACHED={GCI:[0,0,0,0,0],SOLD:[0,0,0,0,0],APPR:[1,2,1,0,0],DK:[2,0,0,0,0]};
        var wi=weeks.indexOf(w);
        KPIs.forEach(function(k){act[k]=(CACHED[k]&&CACHED[k][wi])||0;});
      } else {
        KPIs.forEach(function(k){act[k]=0;});
      }
    }
    return act;
  });

  // Build header
  var html='<table class="weekly-table"><thead><tr><th class="kpi-col">KPI</th>';
  weeks.forEach(function(w,i){
    var ws=dateToStr(w.start),we=dateToStr(w.end);
    var isCur=todayStr>=ws&&todayStr<=we;
    var isPast=we<todayStr;
    var lbl='W'+(i+1)+'<br><span style="font-size:9px;font-weight:500;opacity:.75">'
      +w.start.toLocaleDateString('en-AU',{day:'numeric',month:'short'})
      +(w.start.toDateString()!==w.end.toDateString()?'&ndash;'+w.end.toLocaleDateString('en-AU',{day:'numeric',month:'short'}):'')
      +'</span>';
    html+='<th'+(isCur?' style="background:#1e3d70"':'')+'>'+lbl+'</th>';
  });
  html+='</tr></thead><tbody>';

  KPIs.forEach(function(k){
    var m=isMon(k);
    var total=periodTgt[k];
    html+='<tr><td class="kpi-label">'+KLBL[k]
      +'<span class="w-tgt">'+(total?'Target: '+(m?fmtD(total):total)+' total':'No target')+'</span></td>';

    var cumulativeActual=0; // running total of actuals so far
    weeks.forEach(function(w,i){
      var ws=dateToStr(w.start),we=dateToStr(w.end);
      var isCur=todayStr>=ws&&todayStr<=we;
      var isPast=we<todayStr;
      var act=wkActuals[i][k]||0;
      var cell='';

      if(!total){
        // No target — just show actuals
        cell='<span class="'+(isPast||isCur?'':'w-future')+'">'+(isPast||isCur?fmtV(act,m):'\u2014')+'</span>';
      } else {
        if(isPast){
          cumulativeActual+=act;
          // What was needed this week to be on pace?
          var weeksLeft=numWeeks-i; // including this week
          // Pace needed entering this week = remaining target / weeks remaining
          var neededThisWeek=Math.round((total-((i>0?cumulativeActual-act:0)))/weeksLeft*10)/10;
          var ok=act>=neededThisWeek;
          cell='<span class="'+(ok?'w-past-ok':'w-past-bad')+'">'+(m?fmtD(act):act)+'</span>'
            +'<span class="w-tgt">'+(ok?'\u2713 on pace':'vs '+(m?fmtD(neededThisWeek):neededThisWeek)+' needed')+'</span>';
        } else if(isCur){
          cumulativeActual+=act;
          // Remaining target = total - cumulative so far
          var remaining=Math.max(total-cumulativeActual,0);
          // Weeks left including this one
          var weeksFromHere=numWeeks-i;
          // If behind: catch-up needed this week
          var idealSoFar=Math.round(total*(i+1)/numWeeks*10)/10; // what we should have by end of this week
          var catchUpThis=Math.max(Math.round((total-cumulativeActual)*10)/10,0);
          // What to do THIS week to get back on track
          var needThisWeek=Math.round(catchUpThis/weeksFromHere*10)/10; // spread catch-up over remaining weeks
          // BUT: show this week's specific need
          var thisWeekSpecific=Math.round((idealSoFar-cumulativeActual+act+(total-total/numWeeks*(i+1)))*10/10)/10;
          // Simpler: remaining / weeks left = needed per remaining week
          var neededPerWeek=Math.round(remaining/(weeksFromHere)*10)/10;
          cell='<span class="w-cur-val">'+(m?fmtD(act):act)+'</span>';
          if(remaining>0){
            cell+='<span class="w-cur-need">Gap: '+(m?fmtD(remaining):remaining)
              +'<br>Need '+(m?fmtD(neededPerWeek):neededPerWeek)+'/wk</span>';
          } else {
            cell+='<span class="w-cur-ok">\u2713 On track!</span>';
          }
        } else {
          // Future — show what's needed per week from here
          // Calculate remaining after current week
          var passedIdx=weeks.findIndex(function(ww){var ws2=dateToStr(ww.start),we2=dateToStr(ww.end);return todayStr>=ws2&&todayStr<=we2;});
          var actualSoFarEnd=0;
          for(var pi=0;pi<=passedIdx;pi++) actualSoFarEnd+=(wkActuals[pi][k]||0);
          var remFromNow=Math.max(total-actualSoFarEnd,0);
          var futureWeeks=numWeeks-passedIdx-1;
          var neededEach=futureWeeks>0?Math.round(remFromNow/futureWeeks*10)/10:0;
          cell='<span class="w-future">'+(m?fmtD(neededEach):neededEach)+'</span>'
            +'<span class="w-tgt">needed/wk</span>';
        }
      }
      html+='<td'+(isCur?' class="w-cur-cell"':'')+'>'+cell+'</td>';
    });
    html+='</tr>';
  });

  html+='</tbody></table>';
  return html;
}

  var st2=lv>=exp?'ok':lv>=exp*0.6?'warn':'bad',fc2=st2==='ok'?'pf-ok':st2==='warn'?'pf-warn':'pf-bad';
  var cp=exp>0?Math.round(lv/exp*100):0,gH2=miss>0?'<div class="reco-gap">Target gap: <span class="gap-val">'+miss+' listings</span></div>':'<div class="reco-gap">Target gap: <span class="gap-met">None \u2014 on track</span></div>';
  var c2='<div class="ratio-card"><div class="klbl">Appraisal \u2192 Listing Rate</div><div class="ratio-big">1:'+actual+'</div><div class="ratio-sub">'+lv+' listings from '+av+' appraisals \u00b7 Target 1 per 8</div>'+sbadge(st2)+'<div class="rate-pct">'+cp+'% of conversion target</div>'+gH2+'<div class="pbar-wrap"><div class="pbar-row"><span class="pbar-lbl">'+lv+' listed</span><span class="pbar-lbl">Target: '+exp+'</span></div><div class="pbar-track"><div class="pbar-fill '+fc2+'" style="width:'+clamp(lv/Math.max(exp,1)*100)+'%"></div><div class="pbar-tgt" style="left:100%"></div></div></div></div>';
  return c1+c2;
}

function barTile(k,vals,lbls,curI,barW,barG,totLbl){

  });

}

}

function splitTile(k,v25,v26){

  var t25=v25.reduce(function(a,b){return a+b;},0),t26=v26.reduce(function(a,b){return a+b;},0),mx=Math.max.apply(null,v25.concat(v26).concat(1));

    +'<div style="text-align:right"><div style="font-size:11px;font-weight:800;color:#132744">'+FY_LBL+'</div><div class="ctitle-tot">'+fmtV(t26,m)+'</div></div>'
    +'</div></div>'
    +'<div class="split-grid">'
    +'<div>'
    +'<div class="chart-wrap" style="height:130px;gap:2px;justify-content:flex-start;padding-top:24px;overflow:visible">'+side(v25,lbl25,false)+'</div></div>'
    +'<div class="split-div"><div class="split-div-line"></div></div>'
    +'<div>'
    +'<div class="chart-wrap" style="height:130px;gap:2px;justify-content:flex-start;padding-top:24px;overflow:visible">'+side(v26,lbl26,true)+'</div></div>'

}

function yrCard(k,p,c){
  var m=isMon(k),v25=p[k]||0,v26=c[k]||0,mx=Math.max(v25,v26,1);
  var chg=v25>0?Math.round((v26-v25)/v25*100):null,ct=chg!==null?(chg>=0?'+':'')+chg+'%':'\u2014',cc=chg===null?'#5a7a9a':chg>=0?'#1a6644':'#8b1a1a';
  return '<div class="yr-card"><div class="klbl">'+FLBLS[k]+'</div><div class="yr-row"><div class="yr-blk"><div class="yr-yr-lbl">'+PREV_FY_LBL+'</div><div class="yr-n-old">'+fmtV(v25,m)+'</div></div><div class="yr-arrow">&rarr;</div><div class="yr-blk"><div class="yr-yr-lbl">'+FY_LBL+'</div><div class="yr-n-new">'+fmtV(v26,m)+'</div></div><div class="yr-chg" style="color:'+cc+'">'+ct+'</div></div><div class="yr-bar-bg"><div class="yr-bar-fill" style="width:'+clamp(v26/mx*100)+'%"></div></div></div>';

function buildQTargetsTable(d){
  // Compact Q1-Q4 table: actual vs target per KPI, with catch-up compensation logic
  var KPIs=['GCI','SOLD','LIST','APPR','DK','BOOKED','CONDUCTED'];
  var KLBL={GCI:'GCI (Comm)',SOLD:'Sold',LIST:'Listings',APPR:'Appraisals',DK:'Door Knocks',BOOKED:'Appts Booked',CONDUCTED:'Appts Done'};
  var qNames=['Q1','Q2','Q3','Q4'];
  var qSub=['Jul–Sep','Oct–Dec','Jan–Mar','Apr–Jun'];

  // Build per-quarter actuals from q_bars (all 4 FY quarters: Q1=Jul-Sep … Q4=Apr-Jun)
  var qData=[0,1,2,3].map(function(qi){
    return {GCI:d.q_bars.GCI[qi]||0,SOLD:d.q_bars.SOLD[qi]||0,LIST:d.q_bars.LIST[qi]||0,APPR:d.q_bars.APPR[qi]||0,DK:d.q_bars.DK[qi]||0,BOOKED:d.q_bars.BOOKED[qi]||0,CONDUCTED:d.q_bars.CONDUCTED[qi]||0};
  });

  // Build header
  var html='<table class="qtgt-table"><thead><tr><th class="kpi-col">KPI / Qtr Target</th>';
  for(var qi=0;qi<4;qi++){
    var isCur=qi===CQ-1, isPast=qi<CQ-1, isFut=qi>CQ-1;
    var badge=isCur?'▶ Current':isPast?'✓ Done':'Upcoming';
    html+='<th'+(isCur?' style="background:#1e3d70"':'')+'>'+qNames[qi]
      +'<br><span style="font-size:9px;font-weight:500;opacity:.75">'+qSub[qi]+'</span>'
      +'<br><span style="font-size:9px;font-weight:700;opacity:.85">'+badge+'</span></th>';
  }
  html+='</tr></thead><tbody>';

  KPIs.forEach(function(k){
    var m=isMon(k), qTgt=TARGETS[k].q[0]; // per-quarter target (base)
    var annualTgt=TARGETS[k].a[0];         // annual target

    html+='<tr><td class="kpi-label">'+KLBL[k]
      +(qTgt?'<span class="q-tgt-lbl">'+( m?fmtD(qTgt):qTgt)+'/qtr target</span>':'<span class="q-tgt-lbl">No target set</span>')+'</td>';

    // Compute cumulative deficit from past quarters (for catch-up logic)
    var cumulativeDef=0;
    for(var pi=0;pi<CQ-1;pi++){
      if(qTgt&&qData[pi]) cumulativeDef+=Math.max(qTgt-(qData[pi][k]||0),0);
    }
    var remainingQtrs=4-CQ; // quarters after current (Q3, Q4 if CQ=2)
    var totalFutureQtrs=4-CQ+1; // current + remaining

    for(var qi=0;qi<4;qi++){
      var isCur=qi===CQ-1, isPast=qi<CQ-1, isFut=qi>CQ-1;
      var val=qData[qi]?qData[qi][k]:null;
      var cell='';

      if(!qTgt){
        // No target — just show actuals or dash
        if(isFut||val===null){
          cell='<span class="q-future">—</span>';
        } else {
          cell='<span class="'+(isPast?'q-actual-ok':'q-actual-cur')+'">'+fmtV(val,m)+'</span>';
        }
      } else if(isPast){
        // Past quarter: show actual vs target, flag gap
        var v=val||0, gap=Math.max(qTgt-v,0), hit=v>=qTgt;
        cell='<span class="'+(hit?'q-actual-ok':'q-actual-bad')+'">'+fmtV(v,m)+'</span>';
        if(hit){
          var surplus=v-qTgt;
          cell+='<span class="q-sub q-sub-ok">✓ Hit'+(surplus>0?' +'+fmtV(surplus,m):'')+'</span>';
        } else {
          cell+='<span class="q-sub q-sub-bad">Gap: '+(m?fmtD(gap):gap)+'</span>';
        }
      } else if(isCur){
        // Current quarter: show actual + remaining gap + compensation needed
        var v=val||0, gap=Math.max(qTgt-v,0);
        cell='<span class="q-actual-cur">'+fmtV(v,m)+'</span>';
        if(gap<=0){
          cell+='<span class="q-sub q-sub-ok">✓ On track!</span>';
          // Still show compensation pill if past quarters left a deficit
          if(cumulativeDef>0){
            var catchPerFuture=remainingQtrs>0?Math.round((cumulativeDef/remainingQtrs)*10)/10:0;
            cell+='<span class="q-catchup-pill">+'+fmtV(catchPerFuture,m)+'/qtr to cover past deficit</span>';
          }
        } else {
          cell+='<span class="q-sub q-sub-bad">Qtr gap: '+(m?fmtD(gap):gap)+'</span>';
          // Show what's needed in future quarters to still hit annual target
          if(remainingQtrs>0){
            var totalShortfall=gap+cumulativeDef; // still owed this qtr + from past
            // Future qtrs need their own target PLUS spread the shortfall
            var extraPerFuture=Math.round((totalShortfall/remainingQtrs)*10)/10;
            var futureNeed=qTgt+(m?extraPerFuture:Math.round(extraPerFuture));
            cell+='<span class="q-catchup-pill">Future qtrs need '+fmtV(futureNeed,m)+' each</span>';
          }
        }
      } else {
        // Future quarter: show actuals if any exist, else show projected need with catch-up
        var v=val||0;
        if(v>0){
          cell='<span class="q-actual-cur">'+fmtV(v,m)+'</span>';
          cell+='<span class="q-sub q-sub-info">Early data</span>';
        } else {
          // Compute catch-up needed: spread remaining deficit over remaining future quarters from here
          var curVal=qData[CQ-1]?qData[CQ-1][k]:0;
          var curGap=Math.max(qTgt-(curVal||0),0);
          var totalOwed=cumulativeDef+curGap;
          var catchUp=remainingQtrs>0?Math.round((totalOwed/remainingQtrs)*10)/10:0;
          var needThisQtr=qTgt+(m?catchUp:Math.round(catchUp));
          cell='<span class="q-future">'+(m?fmtD(needThisQtr):needThisQtr)+' needed</span>';
          cell+='<span class="q-sub q-sub-info">Base: '+(m?fmtD(qTgt):qTgt)
            +(catchUp>0?' <span style="color:#c8820a">+'+fmtV(catchUp,m)+' catch-up</span>':'')
            +'</span>';
          if(catchUp>0){
            cell+='<span class="q-catchup-pill">Covers '+(m?fmtD(totalOwed):totalOwed)+' deficit</span>';
          } else {
            cell+='<span class="q-catchup-pill q-cp-good">No catch-up needed</span>';
          }
        }
      }
      html+='<td'+(isCur?' class="q-cur-cell"':'')+'>'+cell+'</td>';
    }
    html+='</tr>';
  });

  // Summary row: annual target pace check
  html+='<tr style="background:#f8fafc"><td class="kpi-label" style="color:#132744;font-weight:800">ANNUAL PACE</td>';
  for(var qi=0;qi<4;qi++){
    var isCur=qi===CQ-1;
    var ytdActual=0;
    for(var pi=0;pi<=qi&&pi<=CQ-1;pi++) if(qData[pi]) ytdActual+=(qData[pi].GCI||0);
    var annTgt=TARGETS.GCI.a[0];
    var qTgtGCI=TARGETS.GCI.q[0];
    if(qi<CQ){
      var expectedYTD=qTgtGCI*(qi+1);
      var pace=annTgt>0?Math.round(ytdActual/expectedYTD*100):null;
      var paceOk=pace!=null&&pace>=100;
      html+='<td'+(isCur?' class="q-cur-cell"':'')+'>'
        +'<span class="'+(paceOk?'q-actual-ok':'q-actual-bad')+'" style="font-size:11px">'+(pace!=null?pace+'%':'—')+' of pace</span>'
        +'<span class="q-sub q-sub-info">YTD '+fmtD(ytdActual)+'</span></td>';
    } else {
      var remainAfterCur=Math.max(annTgt-(qData[CQ-1]?(function(){var s=0;for(var pi=0;pi<CQ;pi++) if(qData[pi]) s+=qData[pi].GCI||0;return s;})():0),0);
      var remQ=4-CQ;
      var needPerQ=remQ>0?Math.round(remainAfterCur/remQ):0;
      html+='<td><span class="q-future" style="font-size:11px">'+fmtD(needPerQ)+'/qtr</span>'
        +'<span class="q-sub q-sub-info">to hit '+fmtD(annTgt)+'</span></td>';
    }
  }
  html+='</tr>';

  html+='</tbody></table>';
  return html;
}


function yrCompareTile(k,prev,cur){
  var m=isMon(k);
  var v25=prev[k]||0, v26=cur[k]||0;
  var mx=Math.max(v25,v26,1);
  var bh25=Math.max(Math.round(v25/mx*100),v25>0?4:0);
  var bh26=Math.max(Math.round(v26/mx*100),v26>0?4:0);
  var chg=v25>0?Math.round((v26-v25)/v25*100):null;
  var chgTxt=chg!==null?(chg>=0?'+':'')+chg+'%':'—';
  var chgCol=chg===null?'#5a7a9a':chg>=0?'#1a7a52':'#b83025';
  return '<div class="chart-tile">'
    +'<div class="ctop"><div class="ctitle-nm">'+FLBLS[k]+'</div>'
    +'<div style="font-size:13px;font-weight:800;color:'+chgCol+'">'+chgTxt+'</div></div>'
    +'<div style="display:flex;align-items:flex-end;gap:32px;padding-top:36px;padding-bottom:28px;position:relative;height:160px">'

    +'<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">'
    +'<div style="position:absolute;top:-24px;font-size:11px;font-weight:800;color:#8aa8c4;white-space:nowrap">'+fmtV(v25,m)+'</div>'
    +'<div style="width:80%;background:#132744;opacity:.45;border-radius:4px 4px 0 0;height:'+bh25+'px"></div>'
    +'<div style="position:absolute;bottom:-22px;font-size:11px;font-weight:700;color:#8aa8c4">'+PREV_FY_LBL+' Total</div>'
    +'</div>'
    // Current FY bar
    +'<div style="flex:1;display:flex;flex-direction:column;align-items:center;position:relative">'
    +'<div style="position:absolute;top:-24px;font-size:11px;font-weight:800;color:#132744;white-space:nowrap">'+fmtV(v26,m)+'</div>'
    +'<div style="width:80%;background:#132744;border-radius:4px 4px 0 0;height:'+bh26+'px"></div>'
    +'<div style="position:absolute;bottom:-22px;font-size:11px;font-weight:700;color:#132744">'+FY_LBL+' YTD</div>'
    +'</div>'
    +'</div>'
    +'</div>';
}

}

function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});el.classList.add('on');render();}

async function doRefresh(){
  if(!TOKEN){
    var t=prompt('Enter your monday.com API token to sync live data.');
    if(!t) return;
    TOKEN=t.trim();
    localStorage.setItem('sre_monday_token',TOKEN);
  }
  var rb=gid('rb'),ov=gid('ov');
  rb.classList.add('busy');
  ov.classList.remove('h');
  try{
    DATA=await fetchLive();
    render();
    showStatus('Live data synced from monday.com — '+new Date().toLocaleString('en-AU'),'ok');
  }catch(err){
    DATA=JSON.parse(JSON.stringify(CACHED_DATA));
    render();
    showStatus('Error: '+err.message+'. Showing cached data.','err');
    if(err.message.indexOf('401')>=0||err.message.indexOf('403')>=0){
      TOKEN=''; localStorage.removeItem('sre_monday_token');
    }
  }
  rb.classList.remove('busy');
  ov.classList.add('h');
}

// Init
DATA = JSON.parse(JSON.stringify(CACHED_DATA));
render();
gid('st').textContent = '19 Jun 2026 (cached)';
showStatus('Showing data from 19 Jun 2026. Click Refresh and enter your monday.com API token to load live data.','info');
</script>
